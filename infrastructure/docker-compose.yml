services:
  postgres:
    image: postgres:16-alpine
    container_name: aporte_postgres_local
    environment:
      POSTGRES_USER: aporte_admin
      POSTGRES_PASSWORD: aporte_secure_pass2026
      POSTGRES_DB: aporte_db_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - role_aporte_network
    restart: unless-stopped

  redis:
    image: redis/redis-stack:latest
    container_name: aporte_redis_local
    environment:
      REDIS_ARGS: "--requirepass aporte_redis_pass2026"
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    networks:
      - role_aporte_network
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: aporte_backend_local
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DB_NAME=aporte_db_local
      - DB_USER=aporte_admin
      - DB_PASSWORD=aporte_secure_pass2026
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_URL=redis://:aporte_redis_pass2026@redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - role_aporte_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  role_aporte_network:
    driver: bridge